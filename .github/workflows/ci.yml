name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build
      
    # Note: Integration tests require NDAMAPS_API_KEY secret 
    # to be set in the repository secrets or mock tokens.
    # - name: Run tests
    #   run: npm run test
